services:
  - type: web
    name: vietbook-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python seed.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vietbook-db
          property: connectionString
      - key: MOMO_PARTNER_CODE
        sync: false
      - key: MOMO_ACCESS_KEY
        sync: false
      - key: MOMO_SECRET_KEY
        sync: false
      - key: MOMO_IPN_URL
        sync: false
      - key: MOMO_REDIRECT_BASE_URL
        sync: false
  - type: web
    name: vietbook-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
databases:
  - name: vietbook-db
    plan: free
    databaseName: vietbook
    user: vietbook_user
